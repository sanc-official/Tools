<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteMap Studio | Web制作提案用サイトマップ作成ツール</title>
  <!-- © 2025 Sanc-Official / Satoshi Sasaki - s.sasaki@sanc-official.com -->
  <!-- Developed by Sanc-Official. Unauthorized copying or redistribution is prohibited. -->
  <meta name="author" content="Satoshi Sasaki / Sanc-Official">
  <meta name="copyright" content="© 2025 Sanc-Official">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232563EB'/><text x='32' y='46' font-family='Georgia,serif' font-size='50' font-weight='900' text-anchor='middle' fill='white'>S</text></svg>">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --primary: #2563EB;
      --primary-light: #EFF6FF;
      --primary-mid: #BFDBFE;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-900: #0F172A;
      --white: #FFFFFF;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 2px 8px rgba(0, 0, 0, .07);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, .10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── HEADER ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-brand h1 {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--gray-900)
    }

    .brand-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 999px;
      letter-spacing: .03em;
    }

    .brand-ver {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      background: var(--gray-100);
      color: var(--gray-400);
      border-radius: 999px;
      border: 1px solid var(--gray-200);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-ghost {
      background: transparent;
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
    }

    .btn-ghost:hover {
      background: var(--gray-100);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      opacity: .88;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, .3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-danger {
      background: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FECACA;
    }

    .btn-danger:hover {
      background: #DC2626;
      color: white;
    }

    /* ── BODY ── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 360px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
    }

    .sidebar-tab {
      flex: 1;
      padding: 10px 4px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }

    .sidebar-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .sidebar-tab:hover:not(.active) {
      color: var(--gray-600);
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    @media(pointer:fine) {
      ::-webkit-scrollbar {
        width: 5px
      }

      ::-webkit-scrollbar-track {
        background: var(--gray-100)
      }

      ::-webkit-scrollbar-thumb {
        background: var(--gray-300);
        border-radius: 3px
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--gray-400)
      }
    }

    /* ── FORM ── */
    .form-section {
      margin-bottom: 20px;
    }

    .form-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .form-field {
      margin-bottom: 10px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 4px;
    }

    .form-input,
    .form-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      color: var(--gray-900);
      background: var(--white);
      font-family: inherit;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .08);
    }

    .form-input::placeholder {
      color: var(--gray-300);
    }

    /* ── COLOR CHIPS ── */
    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-chip {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .15s;
      outline: 2px solid transparent;
    }

    .color-chip:hover {
      transform: scale(1.15);
    }

    .color-chip.active {
      outline-color: var(--gray-900);
      outline-offset: 2px;
    }

    /* ── PAGE EDITOR ── */
    .pages-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .pages-header .form-section-title {
      margin-bottom: 0;
    }

    .add-root-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px dashed var(--gray-300);
      border-radius: var(--radius);
      background: transparent;
      color: var(--gray-500);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }

    .add-root-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .pe-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pe-item {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      background: var(--white);
      overflow: hidden;
      transition: border-color .15s;
    }

    .pe-item:hover {
      border-color: var(--gray-300);
    }

    .pe-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px 7px 10px;
      background: var(--gray-50);
    }

    .pe-icon-btn {
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      transition: background .15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .pe-icon-btn:hover {
      background: var(--gray-200);
    }

    .pe-name {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      color: var(--gray-900);
      min-width: 0;
      font-family: inherit;
    }

    .pe-name::placeholder {
      color: var(--gray-300);
      font-weight: 400;
    }

    .pe-btns {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .ib {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .12s;
      font-family: inherit;
    }

    .ib:hover {
      background: var(--gray-200);
      color: var(--gray-900);
    }

    .ib:disabled {
      opacity: .3;
      cursor: not-allowed;
    }

    .ib.add {
      border: 1px solid #C7D2FE;
      background: var(--primary-light);
      color: var(--primary);
    }

    .ib.add:hover {
      background: #DBEAFE;
      color: #1D4ED8;
      border-color: #93C5FD;
    }

    .ib.del {
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-400);
    }

    .ib.del:hover {
      background: #FEF2F2;
      color: #DC2626;
      border-color: #FECACA;
    }

    .pe-body {
      padding: 5px 10px 8px;
    }

    .pe-desc {
      width: 100%;
      border: none;
      font-size: 12px;
      color: var(--gray-500);
      resize: none;
      outline: none;
      background: transparent;
      line-height: 1.6;
      font-family: inherit;
      min-height: 34px;
    }

    .pe-desc::placeholder {
      color: var(--gray-300);
    }

    .pe-children {
      padding: 4px 8px 8px 16px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pe-empty {
      text-align: center;
      color: var(--gray-400);
      font-size: 13px;
      padding: 36px 20px;
      line-height: 1.8;
    }

    .add-root-bottom-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border: 1.5px dashed var(--gray-300);
      border-radius: var(--radius);
      background: transparent;
      color: var(--gray-500);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .add-root-bottom-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* ── AI TAB ── */
    .ai-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--gray-100);
    }

    .ai-section:last-child {
      border-bottom: none;
    }

    .ai-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .ai-status {
      font-size: 12px;
      min-height: 18px;
      margin-top: 8px;
    }

    .kw-result {
      margin-top: 8px;
    }

    .api-key-area {
      padding: 10px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      margin-top: 16px;
    }

    .api-key-area .form-label {
      margin-bottom: 6px;
    }

    .api-key-row {
      display: flex;
      gap: 6px;
    }

    .api-key-row .form-input {
      flex: 1;
    }

    /* ── PREVIEW ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      gap: 12px;
    }

    .preview-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .preview-note {
      font-size: 11px;
      color: var(--gray-400);
    }

    .preview-content {
      flex: 1;
      overflow: auto;
      background: #EEF6FF;
      background-image: radial-gradient(circle at 20px 20px, rgba(37, 99, 235, .05) 2px, transparent 0);
      background-size: 40px 40px;
    }

    /* ── SITEMAP PREVIEW ── */
    .sm-wrap {
      min-height: 100%;
      padding: 28px 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .sm-header {
      margin-bottom: 24px;
      padding: 20px 24px;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 800px;
    }

    .sm-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .sm-site-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -.02em;
    }

    .sm-badge {
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      background: var(--primary-light);
      color: var(--primary);
    }

    .sm-meta {
      font-size: 12px;
      color: var(--gray-400);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .sm-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── TREE ── */
    .sm-tree {
      width: 100%;
    }

    .sm-tree ul {
      list-style: none;
      padding: 0;
      margin: 0;
      padding-left: 22px;
      position: relative;
    }

    .sm-tree ul::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 14px;
      width: 2px;
      background: var(--sm-line, #BFDBFE);
      border-radius: 1px;
    }

    .sm-tree li {
      position: relative;
      margin-bottom: 8px;
    }

    .sm-tree li::before {
      content: '';
      position: absolute;
      left: -22px;
      top: 19px;
      width: 18px;
      height: 2px;
      background: var(--sm-line, #BFDBFE);
    }

    .sm-tree>ul::before {
      display: none;
    }

    .sm-tree>ul>li::before {
      display: none;
    }

    .sm-node-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: white;
      border-radius: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      border-left: 4px solid var(--sm-color, var(--primary));
      transition: all .18s;
      min-width: 140px;
      max-width: 400px;
      user-select: none;
    }

    .sm-node-card:hover {
      transform: translateX(3px);
      box-shadow: var(--shadow-md);
    }

    .sm-node-icon {
      font-size: 17px;
      flex-shrink: 0;
    }

    .sm-node-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      flex: 1;
    }

    .sm-node-desc-hint {
      font-size: 10px;
      color: var(--gray-400);
      white-space: nowrap;
    }

    .sm-toggle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gray-100);
      border: none;
      cursor: pointer;
      font-size: 9px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
    }

    .sm-toggle:hover {
      background: var(--gray-200);
    }

    .sm-toggle.open {
      background: var(--sm-color, var(--primary));
      color: white;
    }

    .sm-node-children {
      margin-top: 6px;
      overflow: hidden;
    }

    .sm-tree>ul>li>.sm-node-card {
      padding: 13px 20px;
      border-radius: 12px;
      border-left-width: 5px;
    }

    .sm-tree>ul>li>.sm-node-card .sm-node-name {
      font-size: 15px;
    }

    .sm-tree>ul>li>.sm-node-card .sm-node-icon {
      font-size: 20px;
    }

    .sm-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--gray-400);
      text-align: center;
      gap: 10px;
    }

    .sm-empty .empty-icon {
      font-size: 40px;
      opacity: .4;
    }

    .sm-empty p {
      font-size: 13px;
      line-height: 1.9;
    }

    /* ── OVERLAYS ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      backdrop-filter: blur(3px);
    }

    .overlay.show {
      display: flex;
    }

    .overlay-box {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
      max-width: 360px;
      width: 90%;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      margin-top: 40px;
    }

    .overlay-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--gray-900);
    }

    .overlay-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    /* icon picker */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }

    .icon-option {
      aspect-ratio: 1;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .12s;
    }

    .icon-option:hover {
      background: var(--gray-100);
      border-color: var(--gray-200);
    }

    .icon-option.selected {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    /* sample modal */
    .sample-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }

    .sample-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 10px 12px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      background: transparent;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      font-family: inherit;
      width: 100%;
    }

    .sample-card:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, .12);
    }

    .sc-icon {
      font-size: 26px;
      line-height: 1;
    }

    .sc-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .sc-desc {
      font-size: 11px;
      color: var(--gray-400);
      line-height: 1.4;
    }

    /* detail modal */
    .dm-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .dm-icon {
      font-size: 30px;
      flex-shrink: 0;
      line-height: 1;
    }

    .dm-desc-box {
      background: var(--gray-50);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--gray-500);
      line-height: 1.8;
      min-height: 50px;
      white-space: pre-wrap;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 24px;
      padding: 11px 17px;
      background: var(--gray-900);
      color: white;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
      z-index: 2000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── PRINT ── */
    @media print {

      .app-header,
      .sidebar,
      .preview-toolbar,
      .toast,
      .overlay {
        display: none !important
      }

      .preview-content {
        background: white !important;
        overflow: visible !important
      }

      .sm-wrap {
        padding: 20px !important
      }

      .sm-node-card {
        box-shadow: none !important;
        border-radius: 6px !important
      }

      .sm-node-children {
        display: block !important;
        overflow: visible !important
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-brand">
      <h1>SiteMap Studio</h1>
      <span class="brand-badge">AI搭載</span>
      <span class="brand-ver">β v1.1</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="openSampleModal()">📂 サンプル</button>
      <button class="btn btn-ghost" onclick="resetAll()">🔄 リセット</button>
      <button class="btn btn-ghost" onclick="printPDF()">🖨️ PDF保存</button>
      <button class="btn btn-ghost" onclick="exportXML()">🗂️ XML出力</button>
      <button class="btn btn-primary" onclick="exportHTML()">⬇️ HTML保存</button>
    </div>
  </header>

  <!-- BODY -->
  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchTab('pages',this)">📑 ページ構成</button>
        <button class="sidebar-tab" onclick="switchTab('settings',this)">⚙️ 設定</button>
        <button class="sidebar-tab" onclick="switchTab('ai',this)">✦ AI生成</button>
      </div>
      <div class="sidebar-body">

        <!-- TAB: ページ構成 -->
        <div id="tab-pages">
          <div class="pages-header">
            <div class="form-section-title">ページ一覧　<span id="page-count"
                style="font-weight:400;color:var(--gray-400)"></span></div>
            <button class="add-root-btn" onclick="addRoot()">＋ ページを追加</button>
          </div>
          <div id="pe-list" class="pe-list">
            <div class="pe-empty">まだページがありません<br>「＋ ページを追加」から<br>始めましょう</div>
          </div>
          <button class="add-root-bottom-btn" id="add-bottom" onclick="addRoot()" style="display:none">＋ ページを追加</button>
        </div>

        <!-- TAB: 設定 -->
        <div id="tab-settings" style="display:none">
          <div class="form-section">
            <div class="form-section-title">サイト情報</div>
            <div class="form-field">
              <label class="form-label">サイト名</label>
              <input id="f-sitename" class="form-input" type="text" placeholder="例：〇〇クリニック 採用サイト"
                oninput="renderPreview()">
            </div>
            <div class="form-field">
              <label class="form-label">クライアント名</label>
              <input id="f-client" class="form-input" type="text" placeholder="例：〇〇クリニック" oninput="renderPreview()">
            </div>
            <div class="form-field">
              <label class="form-label">作成日</label>
              <input id="f-date" class="form-input" type="date" oninput="renderPreview()">
            </div>
            <div class="form-field">
              <label class="form-label">制作会社名（任意）</label>
              <input id="f-agency" class="form-input" type="text" placeholder="例：Sanc-Official"
                oninput="renderPreview()">
            </div>
          </div>
          <div class="form-section">
            <div class="form-section-title">テーマカラー</div>
            <div class="color-row" id="color-chips"></div>
          </div>
          <div class="form-section">
            <div class="form-section-title">メモ</div>
            <textarea id="f-note" class="form-input" rows="3" placeholder="例：このサイトマップは提案資料です。内容は変更になる場合があります。"
              oninput="renderPreview()" style="resize:vertical;line-height:1.6;font-size:13px"></textarea>
          </div>
          <div class="api-key-area">
            <div class="form-label">🔑 Gemini API キー</div>
            <div class="api-key-row">
              <input type="password" id="api-key" class="form-input" placeholder="AIza...">
              <button class="btn btn-ghost" onclick="saveApiKey()">保存</button>
            </div>
            <div id="api-key-status" style="font-size:11px;color:var(--gray-400);margin-top:5px">
              取得先：<a href="https://aistudio.google.com" target="_blank"
                style="color:var(--primary)">aistudio.google.com</a>（無料）
            </div>
          </div>
        </div>

        <!-- TAB: AI生成 -->
        <div id="tab-ai" style="display:none">
          <!-- URLスキャン -->
          <div class="ai-section">
            <div class="ai-section-title">🌐 URLスキャン</div>
            <div class="form-field">
              <input id="scan-url" class="form-input" type="url" placeholder="https://example.com">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="scanURL()">🌐 URLをスキャン</button>
            <div id="scan-status" class="ai-status"></div>
          </div>
          <!-- テンプレート -->
          <div class="ai-section">
            <div class="ai-section-title">🏗️ テンプレート生成</div>
            <div class="form-field">
              <select id="ai-type" class="form-select">
                <option value="">業種を選択</option>
                <option value="corp">コーポレートサイト</option>
                <option value="clinic">医療クリニック</option>
                <option value="recruit">採用サイト</option>
                <option value="accounting">会計事務所</option>
                <option value="construction">建設・工務店</option>
                <option value="rental">民泊・レンタル</option>
                <option value="ec">ECサイト</option>
                <option value="portfolio">ポートフォリオ</option>
                <option value="restaurant">飲食・カフェ</option>
              </select>
            </div>
            <button class="btn btn-ghost" style="width:100%;border-color:var(--primary);color:var(--primary)"
              onclick="generateTemplate()">✦ テンプレートを生成</button>
          </div>
          <!-- キーワード提案 -->
          <div class="ai-section">
            <div class="ai-section-title">🔍 SEOキーワード提案</div>
            <div class="form-field">
              <input id="kw-target" class="form-input" type="text" placeholder="例：眼科クリニック 採用サイト">
            </div>
            <button class="btn btn-ghost" style="width:100%;border-color:var(--primary);color:var(--primary)"
              onclick="suggestKeywords()">✦ キーワードを提案</button>
            <div id="kw-result" class="kw-result"></div>
          </div>
        </div>

      </div>
    </aside>

    <!-- PREVIEW -->
    <main class="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-label">リアルタイムプレビュー</span>
        <span class="preview-note">💡 ブロックをクリックで詳細確認</span>
      </div>
      <div class="preview-content">
        <div id="preview-root"></div>
      </div>
    </main>
  </div>

  <!-- ICON PICKER -->
  <div id="icon-picker" class="overlay" onclick="closeIconPicker()">
    <div class="overlay-box" onclick="event.stopPropagation()">
      <div class="overlay-title">アイコンを選択</div>
      <div class="icon-grid" id="icon-grid"></div>
      <div class="overlay-actions">
        <button class="btn btn-ghost" onclick="closeIconPicker()">キャンセル</button>
        <button class="btn btn-primary" onclick="applyIcon()">選択</button>
      </div>
    </div>
  </div>

  <!-- SAMPLE MODAL -->
  <div id="sample-modal" class="overlay" onclick="closeSampleModal()">
    <div class="overlay-box" style="max-width:480px" onclick="event.stopPropagation()">
      <div class="overlay-title">📂 サンプルを選択</div>
      <p style="font-size:12px;color:var(--gray-400);margin-bottom:14px">業種を選ぶとサンプル構成を読み込みます</p>
      <div class="sample-grid">
        <button class="sample-card" onclick="loadSample('corp')"><span class="sc-icon">🏢</span><span
            class="sc-name">コーポレート</span><span class="sc-desc">企業情報・サービス・採用</span></button>
        <button class="sample-card" onclick="loadSample('clinic')"><span class="sc-icon">🏥</span><span
            class="sc-name">医療クリニック</span><span class="sc-desc">診療案内・医師・予約</span></button>
        <button class="sample-card" onclick="loadSample('recruit')"><span class="sc-icon">🚀</span><span
            class="sc-name">採用サイト</span><span class="sc-desc">職種・インタビュー・エントリー</span></button>
        <button class="sample-card" onclick="loadSample('accounting')"><span class="sc-icon">📊</span><span
            class="sc-name">会計事務所</span><span class="sc-desc">サービス・スタッフ・相談</span></button>
        <button class="sample-card" onclick="loadSample('construction')"><span class="sc-icon">🏗️</span><span
            class="sc-name">建設・工務店</span><span class="sc-desc">施工事例・サービス</span></button>
        <button class="sample-card" onclick="loadSample('rental')"><span class="sc-icon">🏡</span><span
            class="sc-name">民泊・レンタル</span><span class="sc-desc">施設・予約・アクセス</span></button>
        <button class="sample-card" onclick="loadSample('portfolio')"><span class="sc-icon">🎨</span><span
            class="sc-name">ポートフォリオ</span><span class="sc-desc">作品集・プロフィール</span></button>
        <button class="sample-card" onclick="loadSample('restaurant')"><span class="sc-icon">🍽️</span><span
            class="sc-name">飲食・カフェ</span><span class="sc-desc">メニュー・予約・店舗情報</span></button>
      </div>
      <div class="overlay-actions" style="margin-top:10px">
        <button class="btn btn-ghost" onclick="closeSampleModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div id="detail-modal" class="overlay" onclick="closeDetailModal()">
    <div class="overlay-box" style="max-width:420px" onclick="event.stopPropagation()">
      <div class="dm-header">
        <span class="dm-icon" id="dm-icon"></span>
        <div>
          <div style="font-size:11px;color:var(--gray-400);margin-bottom:3px">掲載コンテンツ</div>
          <div id="dm-title" style="font-size:16px;font-weight:700;color:var(--gray-900)"></div>
        </div>
      </div>
      <div id="dm-desc" class="dm-desc-box"></div>
      <div class="overlay-actions">
        <button class="btn btn-ghost" onclick="closeDetailModal()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script>
    // ============================================================
    // DATA
    // ============================================================
    const COLORS = [
      { name: 'ブルー', value: '#2563EB', line: '#BFDBFE' },
      { name: 'インディゴ', value: '#4F46E5', line: '#C7D2FE' },
      { name: 'ティール', value: '#0D9488', line: '#99F6E4' },
      { name: 'グリーン', value: '#16A34A', line: '#BBF7D0' },
      { name: 'パープル', value: '#7C3AED', line: '#DDD6FE' },
      { name: 'ピンク', value: '#DB2777', line: '#FBCFE8' },
      { name: 'オレンジ', value: '#EA580C', line: '#FED7AA' },
      { name: 'グレー', value: '#374151', line: '#D1D5DB' },
    ];

    const ICONS = [
      '📄', '🏠', '🏢', '👥', '🛍️', '📞', '📰', '⭐',
      '🔧', '📊', '💡', '🎯', '🏆', '❓', '📷', '🎨',
      '🌐', '📱', '💼', '🔑', '📍', '✉️', '🗂️', '📋',
      '🔍', '📈', '💬', '🎁', '🚀', '⚡', '🌟', '🏥',
      '🩺', '💊', '🦷', '👁️', '🍽️', '🏗️', '🏡', '🎪',
    ];

    let seq = 0;
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function newPage(name = '新しいページ', icon = '📄') {
      return { id: `p${++seq}`, name, icon, description: '', children: [] };
    }

    let data = {
      project: { name: '新しいウェブサイト', client: '', date: todayStr(), agency: '', note: '', color: COLORS[0].value, lineColor: COLORS[0].line },
      pages: []
    };

    // ============================================================
    // STORAGE
    // ============================================================
    function save() { try { localStorage.setItem('sms_v2', JSON.stringify(data)); } catch (e) { } }
    function loadStored() {
      try {
        const s = localStorage.getItem('sms_v2');
        if (s) { data = JSON.parse(s); seq = calcMaxSeq(data.pages); }
      } catch (e) { }
    }
    function calcMaxSeq(pages) {
      let m = 0;
      for (const p of pages) {
        const n = parseInt(p.id.slice(1));
        if (!isNaN(n) && n > m) m = n;
        m = Math.max(m, calcMaxSeq(p.children || []));
      }
      return m;
    }

    // ============================================================
    // PAGE CRUD
    // ============================================================
    function findPage(nodes, id) {
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].id === id) return { page: nodes[i], arr: nodes, idx: i };
        const r = findPage(nodes[i].children || [], id);
        if (r) return r;
      }
      return null;
    }
    function countPages(nodes) {
      return (nodes || []).reduce((s, p) => s + 1 + countPages(p.children), 0);
    }

    function addRoot() {
      const pg = newPage();
      data.pages.push(pg);
      save(); renderAll();
      setTimeout(() => {
        const el = document.querySelector(`[data-id="${pg.id}"] .pe-name`);
        if (el) { el.focus(); el.select(); }
      }, 60);
    }

    function addChild(parentId) {
      const r = findPage(data.pages, parentId);
      if (!r) return;
      const pg = newPage('子ページ');
      r.page.children.push(pg);
      save(); renderAll();
      setTimeout(() => {
        const el = document.querySelector(`[data-id="${pg.id}"] .pe-name`);
        if (el) { el.focus(); el.select(); }
      }, 60);
    }

    function removePage(id) {
      const r = findPage(data.pages, id);
      if (r) { r.arr.splice(r.idx, 1); save(); renderAll(); }
    }

    function confirmDelete(id) {
      const r = findPage(data.pages, id);
      if (!r) return;
      const msg = r.page.children.length
        ? `「${r.page.name}」と子ページ（${r.page.children.length}件）を削除しますか？`
        : `「${r.page.name}」を削除しますか？`;
      if (confirm(msg)) removePage(id);
    }

    function moveUp(id) {
      const r = findPage(data.pages, id);
      if (r && r.idx > 0) { [r.arr[r.idx - 1], r.arr[r.idx]] = [r.arr[r.idx], r.arr[r.idx - 1]]; save(); renderAll(); }
    }
    function moveDown(id) {
      const r = findPage(data.pages, id);
      if (r && r.idx < r.arr.length - 1) { [r.arr[r.idx], r.arr[r.idx + 1]] = [r.arr[r.idx + 1], r.arr[r.idx]]; save(); renderAll(); }
    }

    function updateField(id, field, value) {
      const r = findPage(data.pages, id);
      if (r) { r.page[field] = value; save(); renderPreview(); }
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderAll() { renderEditor(); renderPreview(); }

    function renderEditor() {
      const list = document.getElementById('pe-list');
      const btn = document.getElementById('add-bottom');
      const countEl = document.getElementById('page-count');
      const total = countPages(data.pages);
      if (countEl) countEl.textContent = total ? `${total}ページ` : '';
      if (!data.pages.length) {
        list.innerHTML = '<div class="pe-empty">まだページがありません<br>「＋ ページを追加」から<br>始めましょう</div>';
        if (btn) btn.style.display = 'none';
        return;
      }
      list.innerHTML = renderItems(data.pages);
      if (btn) btn.style.display = 'flex';
    }

    function renderItems(pages) {
      return pages.map((p, i) => `
    <div class="pe-item" data-id="${p.id}">
      <div class="pe-item-header">
        <button class="pe-icon-btn" onclick="openIconPicker('${p.id}')" title="アイコン変更">${p.icon}</button>
        <input class="pe-name" value="${esc(p.name)}" placeholder="ページ名"
               oninput="updateField('${p.id}','name',this.value)">
        <div class="pe-btns">
          <button class="ib" title="上へ" onclick="moveUp('${p.id}')" ${i === 0 ? 'disabled' : ''}>↑</button>
          <button class="ib" title="下へ" onclick="moveDown('${p.id}')" ${i === pages.length - 1 ? 'disabled' : ''}>↓</button>
          <button class="ib add" title="子ページを追加" onclick="addChild('${p.id}')">＋</button>
          <button class="ib del" title="削除" onclick="confirmDelete('${p.id}')">✕</button>
        </div>
      </div>
      <div class="pe-body">
        <textarea class="pe-desc" placeholder="掲載コンテンツの例：代表挨拶、企業理念…"
                  oninput="updateField('${p.id}','description',this.value)">${esc(p.description || '')}</textarea>
      </div>
      ${p.children && p.children.length ? `<div class="pe-children">${renderItems(p.children)}</div>` : ''}
    </div>
  `).join('');
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    // ============================================================
    // PREVIEW
    // ============================================================
    function renderPreview() {
      const root = document.getElementById('preview-root');
      const color = data.project.color || COLORS[0].value;
      const lineColor = data.project.lineColor || COLORS[0].line;
      const siteName = document.getElementById('f-sitename').value || data.project.name || '新しいウェブサイト';
      const client = document.getElementById('f-client').value || data.project.client || '';
      const dateVal = document.getElementById('f-date').value || data.project.date || '';
      const agency = document.getElementById('f-agency').value || data.project.agency || '';

      // sync back to data
      data.project.name = siteName; data.project.client = client;
      data.project.date = dateVal; data.project.agency = agency;

      const dateDisp = dateVal.replace(/-/g, '/').replace(/(\d{4})\/(\d{2})\/(\d{2})/, '$1年$2月$3日');
      const meta = [];
      if (client) meta.push(`クライアント：${esc(client)}`);
      if (dateDisp) meta.push(`作成日：${dateDisp}`);
      if (agency) meta.push(`制作：${esc(agency)}`);

      root.innerHTML = `
    <div class="sm-wrap" style="--sm-color:${color};--sm-line:${lineColor}">
      <div class="sm-header">
        <div class="sm-header-top">
          <div class="sm-site-name">${esc(siteName)}</div>
          <span class="sm-badge" style="background:${color}18;color:${color}">サイトマップ</span>
        </div>
        ${meta.length ? `<div class="sm-meta">${meta.join('<span style="margin:0 6px">｜</span>')}</div>` : ''}
        <div class="sm-note">💬 各ブロックをクリックすると掲載コンテンツを確認できます</div>
      </div>
      ${data.pages.length
          ? `<div class="sm-tree" style="--sm-color:${color};--sm-line:${lineColor}">${buildTree(data.pages)}</div>`
          : `<div class="sm-empty"><div class="empty-icon">🗺️</div><p>左パネルでページを追加すると<br>ここにプレビューが表示されます</p></div>`
        }
    </div>`;
    }

    function buildTree(pages) {
      const items = pages.map(p => {
        const hasC = p.children && p.children.length > 0;
        const hasD = !!(p.description);
        return `<li>
      <div class="sm-node-card" onclick="showDetail('${p.id}')">
        <span class="sm-node-icon">${p.icon}</span>
        <span class="sm-node-name">${esc(p.name)}</span>
        ${hasD ? '<span class="sm-node-desc-hint">📝</span>' : ''}
        ${hasC ? `<button class="sm-toggle open" id="tb-${p.id}" onclick="event.stopPropagation();pvToggle('${p.id}')">▼</button>` : ''}
      </div>
      ${hasC ? `<div id="ch-${p.id}" class="sm-node-children">${buildTree(p.children)}</div>` : ''}
    </li>`;
      }).join('');
      return `<ul>${items}</ul>`;
    }

    function pvToggle(id) {
      const ch = document.getElementById('ch-' + id);
      const btn = document.getElementById('tb-' + id);
      if (!ch) return;
      const open = ch.style.display !== 'none';
      ch.style.display = open ? 'none' : '';
      btn.textContent = open ? '▶' : '▼';
      btn.classList.toggle('open', !open);
    }

    function showDetail(id) {
      const r = findPage(data.pages, id);
      if (!r) return;
      const p = r.page;
      document.getElementById('dm-icon').textContent = p.icon;
      document.getElementById('dm-title').textContent = p.name;
      document.getElementById('dm-desc').innerHTML = p.description
        ? esc(p.description).replace(/\n/g, '<br>')
        : '<span style="color:var(--gray-300);font-size:12px">掲載コンテンツが未入力です。左パネルの説明欄に入力してください。</span>';
      document.getElementById('detail-modal').classList.add('show');
    }
    function closeDetailModal() { document.getElementById('detail-modal').classList.remove('show'); }

    // ============================================================
    // ICON PICKER
    // ============================================================
    let _iconTarget = null, _selectedIcon = null;
    function openIconPicker(id) {
      _iconTarget = id;
      const r = findPage(data.pages, id);
      _selectedIcon = r ? r.page.icon : '📄';
      const grid = document.getElementById('icon-grid');
      grid.innerHTML = ICONS.map(ico => `
    <button class="icon-option ${ico === _selectedIcon ? 'selected' : ''}" onclick="selectIcon('${ico}',this)">${ico}</button>
  `).join('');
      document.getElementById('icon-picker').classList.add('show');
    }
    function selectIcon(ico, btn) {
      document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      _selectedIcon = ico;
    }
    function applyIcon() {
      if (_iconTarget && _selectedIcon) { updateField(_iconTarget, 'icon', _selectedIcon); renderEditor(); }
      closeIconPicker();
    }
    function closeIconPicker() { document.getElementById('icon-picker').classList.remove('show'); _iconTarget = null; }

    // ============================================================
    // TAB SWITCH
    // ============================================================
    function switchTab(tab, btn) {
      ['pages', 'settings', 'ai'].forEach(t => document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none');
      document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // ============================================================
    // SAMPLE MODAL
    // ============================================================
    function openSampleModal() { document.getElementById('sample-modal').classList.add('show'); }
    function closeSampleModal() { document.getElementById('sample-modal').classList.remove('show'); }

    // ============================================================
    // TEMPLATES (flat → nested via flatToNested)
    // ============================================================
    const TEMPLATES = {

    function flatToNested(flatPages) {
      const result = [];
      let curL0 = null, curL1 = null;
      for (const p of flatPages) {
        const node = newPage(p.name, p.icon || '📄');
        if (p.level === 0) { result.push(node); curL0 = node; curL1 = null; }
        else if (p.level === 1) { (curL0 ? curL0.children : result).push(node); curL1 = node; }
        else { (curL1 ? curL1.children : curL0 ? curL0.children : result).push(node); }
      }
      return result;
    }

    // ============================================================
    // GEMINI API

    const GEMINI_MODEL = 'gemini-2.0-flash';
    function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
    function saveApiKey() {
      const key = document.getElementById('api-key').value.trim();
      if (!key) { showToast('APIキーを入力してください'); return; }
      if (!key.startsWith('AIza')) { showToast('Gemini APIキーは "AIza" から始まります'); return; }
      localStorage.setItem('gemini_api_key', key);
      document.getElementById('api-key-status').innerHTML = '<span style="color:#16A34A">✓ APIキーを保存しました</span>';
      showToast('✓ Gemini APIキーを保存しました');
    }
    async function callGemini(prompt) {
      const key = getApiKey();
      if (!key) throw new Error('APIキーが設定されていません。設定タブからGemini APIキーを保存してください。');
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
        {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 2048 } })
        }
      );
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `APIエラー: ${res.status}`); }
      const d = await res.json();
      return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    // ============================================================
    // URL SCAN
    // ============================================================
    async function scanURL() {
      const url = document.getElementById('scan-url').value.trim();
      if (!url) { showToast('URLを入力してください'); return; }
      if (!url.startsWith('http')) { showToast('https:// から始まるURLを入力してください'); return; }
      const statusEl = document.getElementById('scan-status');
      const btn = document.querySelector('[onclick="scanURL()"]');
      btn.disabled = true; btn.textContent = '取得中...';
      statusEl.innerHTML = '<span style="color:var(--primary)">🔄 サイトを取得中...</span>';
      try {
        const proxies = [
          u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
          u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
          u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
        ];
        let html = '';
        for (const fn of proxies) {
          try {
            statusEl.innerHTML = `<span style="color:var(--primary)">🔄 取得中... (${proxies.indexOf(fn) + 1}/3)</span>`;
            const res = await fetch(fn(url), { signal: AbortSignal.timeout(10000) });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            if (text.trim().startsWith('{')) { const j = JSON.parse(text); html = j.contents || j.data || text; }
            else { html = text; }
            if (html && html.length > 100) break;
          } catch (e) { continue; }
        }
        if (!html || html.length < 100) throw new Error('HTMLを取得できませんでした。URLを確認するか再試行してください。');
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const siteTitle = doc.querySelector('title')?.textContent?.trim() || '';
        const navLinks = [...doc.querySelectorAll('nav a,header a,.menu a,#menu a,.nav a,.navigation a')]
          .map(a => a.textContent.trim()).filter(t => t.length > 0 && t.length < 30).slice(0, 20);
        const allLinks = [...doc.querySelectorAll('a[href]')]
          .map(a => ({ text: a.textContent.trim(), href: a.getAttribute('href') }))
          .filter(l => l.text.length > 0 && l.text.length < 30 && !l.href.startsWith('#')).slice(0, 40);
        const urlPaths = allLinks.map(l => l.href).filter(h => h && h.startsWith('/') && h.length > 1).slice(0, 30);

        statusEl.innerHTML = '<span style="color:var(--primary)">✦ AIが解析中...</span>';

        const prompt = `
あなたはWeb制作のプロです。以下の情報からサイトマップの階層構造をJSON形式で出力してください。

サイトタイトル: ${siteTitle}
サイトURL: ${url}
【ナビゲーションメニューのリンク（L1候補）】
${navLinks.join('\n')}
【URLパス一覧（階層判断の根拠）】
${urlPaths.join('\n')}
【全リンクテキスト】
${allLinks.slice(0, 30).map(l => l.text).join(', ')}

階層判定ルール（必ず守ること）：
1. <nav>タグ内・グローバルナビに明示されたリンク → level 1
2. URLが1階層（例：/about/）→ level 1
3. URLが2階層以上（例：/service/detail/）→ level 2
4. 疾患名・診療項目・サービス詳細など明らかにサブページのもの → level 2
5. ナビに出てこない本文内リンクは基本 level 2 扱い
6. level 0 はサイト全体のトップ（ドメイン直下）のみ（必ず1件）
7. level 1 は最大8件まで
8. level 2 は最大12件まで
9. ホーム・TOPページはナビの先頭に存在しても level 1 として扱う（level 0 にしない）
10. level 0 はサイト名またはブランド名のみ。ナビのホームリンクと混同しないこと
11. 疾患・検査・予防接種など診療関連ページは「当院の特徴」「診療案内」相当ページの子（level 2）にする
12. 採用情報・アクセス・施設案内の子に診療ページを入れてはいけない

JSON配列のみ返すこと：
[{"name":"ページ名","icon":"絵文字1文字","level":0〜2}]
`;
        const result = await callGemini(prompt);
        const clean = result.replace(/```json|```/g, '').trim();
        const flat = JSON.parse(clean);
        if (!Array.isArray(flat) || flat.length === 0) throw new Error('ページ構成の解析に失敗しました');

        seq = 0;
        data.pages = flatToNested(flat);

        // L0強制補正
        if (!data.pages.some(p => p._isL0)) {
          const l0kw = ['ホーム', 'トップ', 'TOP', 'Home', siteTitle.split('|')[0].trim().split('　')[0].trim()];
          let fixed = false;
          for (const p of data.pages) {
            if (!fixed && l0kw.some(kw => kw && p.name.includes(kw))) {
              // Already root - fine
              fixed = true; break;
            }
          }
        }

        if (siteTitle) {
          document.getElementById('f-sitename').value = siteTitle;
          document.getElementById('f-client').value = siteTitle;
          data.project.name = siteTitle;
          data.project.client = siteTitle;
        }

        statusEl.innerHTML = `<span style="color:#16A34A">✓ ${countPages(data.pages)}ページを読み込みました</span>`;
        showToast(`✦ ${countPages(data.pages)}ページのサイト構成を取得しました！`);
        switchTab('pages', document.querySelectorAll('.sidebar-tab')[0]);
        save(); renderAll();
      } catch (e) {
        statusEl.innerHTML = `<span style="color:#DC2626">⚠ ${e.message}</span>`;
        showToast('エラーが発生しました');
      } finally {
        btn.disabled = false; btn.textContent = '🌐 URLをスキャン';
      }
    }

    // ============================================================
    async function suggestKeywords() {

          <div style="display:flex;flex-wrap:wrap;gap:5px">${(kw.question || []).map(k => tag(k, '#DB2777')).join('')}</div>
        </div>
        ${kw.advice ? `<div style="font-size:11px;color:#475569;background:#F8FAFC;padding:10px;border-radius:6px;line-height:1.7;border-left:3px solid #2563EB">💡 ${kw.advice}</div>` : ''}

        showToast('✦ キーワードを生成しました！');
      } catch (e) {
        resultEl.innerHTML = `<div style="color:#DC2626;font-size:12px;margin-top:6px">⚠ ${e.message}</div>`;
      } finally { btn.disabled = false; }
    }

  .footer{margin-top:24px;}
}

function fp(pages,id){for(const p of pages){if(p.id===id)return p;const r=fp(p.children||[],id);if(r)return r;}return null;}

function tg(id){const c=document.getElementById('ch-'+id);const b=document.getElementById('tb-'+id);if(!c)return;const o=c.style.display!=='none';c.style.display=o?'none':'';b.textContent=o?'▶':'▼';b.classList.toggle('open',!o);}

    function exportXML() {
      if (!data.pages.length) { alert('ページが1つもありません。'); return; }
      const base = prompt('ベースURLを入力してください（例: https://example.com）', 'https://example.com');
      if (!base) return;
      const slugify = s => s.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
      let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;
      const addUrls = (pages, depth) => {
        pages.forEach(p => {
          const slug = depth === 0 ? '/' : '/' + slugify(p.name) + '/';
          xml += `  <url>\n    <loc>${base}${slug}</loc>\n    <changefreq>monthly</changefreq>\n    <priority>${depth === 0 ? '1.0' : depth === 1 ? '0.8' : '0.6'}</priority>\n  </url>\n`;
          addUrls(p.children || [], depth + 1);
        });
      };
      addUrls(data.pages, 0);
      xml += '</urlset>';
      const blob = new Blob([xml], { type: 'application/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'sitemap.xml'; a.click();
      URL.revokeObjectURL(url);
      showToast('✅ XMLをダウンロードしました');
    }

    function printPDF() {
