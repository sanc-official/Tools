<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteMap Studio｜Web制作提案用サイトマップ作成ツール</title>
  <!-- © 2025 Sanc-Official / Satoshi Sasaki - s.sasaki@sanc-official.com -->
  <!-- Developed by Sanc-Official. Unauthorized copying or redistribution is prohibited. -->
  <meta name="author" content="Satoshi Sasaki / Sanc-Official">
  <meta name="copyright" content="© 2025 Sanc-Official">
  <meta name="contact" content="s.sasaki@sanc-official.com">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232d7dd2'/><text x='32' y='46' font-family='Georgia,serif' font-size='46' font-weight='700' text-anchor='middle' fill='white' letter-spacing='-2'>S</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f1f4;
      --border: #dde0e8;
      --accent: #2d7dd2;
      --accent2: #e8406b;
      --accent3: #1dab60;
      --text: #1a1a2e;
      --text2: #6b7280;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--text2);
      font-weight: 400;
      font-size: 12px;
      margin-left: 8px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #7b73ff;
    }

    .btn-success {
      background: var(--accent3);
      color: #0d1a12;
    }

    .btn-success:hover {
      background: #5ff590;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }

    .btn-danger:hover {
      background: var(--accent2);
      color: white;
    }

    /* AI BADGE */
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #6c63ff22, #ff658422);
      border: 1px solid #6c63ff44;
      color: var(--accent);
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .ai-badge::before {
      content: '✦';
      font-size: 10px;
    }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      min-height: 0;
      height: calc(100vh - 57px);
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 11px 8px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 11px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: #6c63ff0a;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-content::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-content::-webkit-scrollbar-track {
      background: var(--surface);
    }

    .sidebar-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 16px;
    }

    .section-label:first-child {
      margin-top: 0;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-group select option {
      background: var(--surface2);
    }

    /* COLOR SWATCHES */
    .color-swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .swatch.active,
    .swatch:hover {
      border-color: white;
      transform: scale(1.15);
    }

    /* AI PANEL */
    .ai-panel {
      background: linear-gradient(135deg, #6c63ff12, #ff658408);
      border: 1px solid #6c63ff33;
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }

    .ai-panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ai-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .ai-input-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
    }

    .ai-input-row input:focus {
      border-color: var(--accent);
    }

    .ai-hint {
      font-size: 10px;
      color: var(--text2);
    }

    /* PAGE LIST */
    .page-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .page-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .page-item:hover {
      border-color: var(--accent);
    }

    .page-item.selected {
      border-color: var(--accent);
      background: #6c63ff12;
    }

    .page-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .page-item-label {
      flex: 1;
      font-size: 12px;
    }

    .page-item-level {
      font-size: 10px;
      color: var(--text2);
      background: var(--border);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .page-item-delete {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .page-item:hover .page-item-delete {
      opacity: 1;
    }

    .page-item-delete:hover {
      color: var(--accent2);
    }

    .add-page-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--text2);
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .add-page-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* CANVAS */
    .canvas-area {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .canvas-toolbar span {
      font-size: 11px;
      color: var(--text2);
    }

    .canvas-scroll {
      flex: 1;
      overflow: auto;
      padding: 40px;
    }

    .canvas-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .canvas-scroll::-webkit-scrollbar-track {
      background: var(--bg);
    }

    .canvas-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* SITEMAP DIAGRAM */
    .sitemap-wrapper {
      min-width: 700px;
      min-height: 400px;
      position: relative;
    }

    .sitemap-header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .sitemap-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--header-color, var(--accent));
    }

    .sitemap-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sitemap-meta {
      font-size: 12px;
      color: var(--text2);
    }

    .tree-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Level rows */
    .level-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      position: relative;
      width: 100%;
      margin-bottom: 0;
    }

    .node-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .connector-v {
      width: 2px;
      height: 30px;
      background: var(--border);
    }

    .connector-h-container {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      margin-bottom: 0;
    }

    .connector-h {
      height: 2px;
      background: var(--border);
      position: absolute;
      top: 0;
    }

    .node {
      min-width: 130px;
      max-width: 160px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .node:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px #0006;
    }

    .node.selected {
      box-shadow: 0 0 0 2px white, 0 8px 20px #0006;
    }

    .node-icon {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .node-label {
      font-size: 12px;
      font-weight: 500;
    }

    .node-type {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .node-price {
      font-size: 10px;
      margin-top: 4px;
      opacity: 0.8;
      font-family: 'Space Mono', monospace;
    }

    /* Level 0 = root */
    .node-l0 {
      min-width: 160px;
      padding: 14px 20px;
      border-radius: 10px;
    }


    .node-l2 {
      min-width: 110px;
      padding: 8px 10px;
    }

    .node-l2 .node-label {
      font-size: 11px;
    }

    /* TREE NODES */
    .tree-wrap {
      padding: 8px 0 40px;
    }

    .tree-node {
      position: relative;
    }

    .tree-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      background: #fff;
      border: 1.5px solid #e2e4eb;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
      transition: box-shadow 0.15s, border-color 0.15s;
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }

    .tree-card:hover {
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
    }

    .tree-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 82, 232, 0.15);
    }

    .tree-card.level-0 {
      border-color: var(--accent);
      background: #f5f4ff;
      font-size: 14px;
    }

    .tree-card .card-icon {
      font-size: 16px;
    }

    .tree-card .card-name {
      flex: 1;
    }

    .tree-card .card-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      background: #f0f0f8;
      color: #888;
    }

    .tree-card.level-0 .card-badge {
      background: #e8e6ff;
      color: var(--accent);
    }

    .tree-card.level-1 .card-badge {
      background: #e6f7ef;
      color: #1dab60;
    }

    .tree-card.level-2 .card-badge {
      background: #fde8ee;
      color: #e8406b;
    }

    /* 接続線 */
    .tree-children {
      position: relative;
      margin-left: 28px;
      padding-left: 20px;
      border-left: 2px solid #e2e4eb;
      margin-top: 0;
    }

    .tree-child-item {
      position: relative;
      margin-top: 8px;
    }

    .tree-child-item::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 50%;
      width: 18px;
      height: 2px;
      background: #e2e4eb;
    }

    .tree-l0-wrap {
      margin-bottom: 8px;
    }

    .tree-l1-wrap {
      margin-top: 8px;
    }

    /* SITEMAP HEADER - light */
    .sitemap-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 28px;
      border-top: 4px solid var(--header-color, var(--accent));
      box-shadow: var(--shadow);
    }

    .sitemap-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .sitemap-meta {
      font-size: 12px;
      color: var(--text2);
    }

    /* NODE overrides for light */
    .node {
      box-shadow: var(--shadow);
    }

    .node:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .node.selected {
      box-shadow: 0 0 0 2px var(--text), 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 12px;
      color: var(--text2);
    }

    .empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 14px;
    }

    .empty-sub {
      font-size: 12px;
      opacity: 0.6;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #0009;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 90vw;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal {
      transform: scale(1);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 8px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text2);
    }

    .stat strong {
      color: var(--text);
      font-family: 'Space Mono', monospace;
    }

    /* LOADING */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .loading-dots span {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 0.8s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* PAGE DETAIL PANEL */
    .detail-panel {
      position: absolute;
      right: 20px;
      top: 60px;
      width: 240px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      z-index: 10;
      box-shadow: 0 10px 30px #0006;
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
      transition: all 0.2s;
    }

    .detail-panel.show {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .detail-panel-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .detail-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
    }

    .detail-close:hover {
      color: var(--text);
    }

    @media (max-width: 700px) {
      .main {
        grid-template-columns: 1fr;
      }

      .sidebar {
        height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo">SiteMap Studio <span>β v1.0</span></div>
      <div class="ai-badge">AI搭載</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="loadSample()">📂 サンプル</button>
      <button class="btn btn-ghost" onclick="resetAll()">🔄 リセット</button>
      <button class="btn btn-ghost" onclick="exportHTML()">⬇️ HTML保存</button>
      <button class="btn btn-success" onclick="exportXML()">🗂️ XML出力</button>
      <button class="btn btn-primary" onclick="printPDF()">🖨️ PDF保存</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="tab active" onclick="switchTab('pages', this)">📑 ページ構成</button>
        <button class="tab" onclick="switchTab('settings', this)">⚙️ 設定</button>
        <button class="tab" onclick="switchTab('ai', this)">✦ AI生成</button>
      </div>

      <!-- PAGES TAB -->
      <div id="tab-pages" class="sidebar-content">
        <div class="section-label">ページ一覧</div>
        <div class="page-list" id="page-list"></div>
        <button class="add-page-btn" onclick="openAddModal()">＋ ページを追加</button>

    // ===== INIT =====
    function init() {
      // Date default
      document.getElementById('created-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('site-name').value = '〇〇株式会社 コーポレートサイト';
      document.getElementById('client-name').value = '〇〇株式会社';
      document.getElementById('agency-name').value = '';

      // Color swatches
      const sw = document.getElementById('color-swatches');
      sw.innerHTML = '';
      SWATCH_COLORS.forEach(c => {
        const el = document.createElement('div');
        el.className = 'swatch' + (c === state.themeColor ? ' active' : '');
        el.style.background = c;
        el.onclick = () => {
          state.themeColor = c;
          document.documentElement.style.setProperty('--accent', c);
          document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
          el.classList.add('active');
          renderCanvas();
          renderPageList();
        };
        sw.appendChild(el);
      });

      renderPageList();
      renderCanvas();

      // APIキーが保存済みなら状態復元
      const savedKey = getApiKey();
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
        document.getElementById('api-key-status').innerHTML =
          '<span style="color:var(--accent3)">✓ APIキー設定済み</span>';
      }
    }

    // ===== TAB SWITCH =====
    function switchTab(name, btn) {
      ['pages', 'settings', 'ai'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
      });
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    // ===== PAGE LIST =====
    function renderPageList() {
      const list = document.getElementById('page-list');
      list.innerHTML = '';
      if (state.pages.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:12px;padding:20px 0">まだページがありません<br>「＋ ページを追加」から始めましょう</div>';
        return;
      }
      state.pages.forEach(p => {
        const levelColor = p.level === 0 ? '#6c63ff' : p.level === 1 ? '#43e97b' : '#ff6584';
        const el = document.createElement('div');
        el.className = 'page-item' + (state.selectedPageId === p.id ? ' selected' : '');
        el.innerHTML = `
      <span class="page-dot" style="background:${levelColor}"></span>
      <span class="page-item-label">${p.icon} ${p.name}</span>
      <span class="page-item-level">L${p.level}</span>
      <button class="page-item-delete" onclick="event.stopPropagation();deletePage(${p.id})">✕</button>
    `;
        el.onclick = () => selectPage(p.id);
        list.appendChild(el);
      });
    }

    function selectPage(id) {
      state.selectedPageId = id;
      renderPageList();
      renderCanvas();
      showDetailPanel(id);
    }

    function deletePage(id) {
      state.pages = state.pages.filter(p => p.id !== id);
      if (state.selectedPageId === id) { state.selectedPageId = null; closeDetail(); }
      renderPageList();
      renderCanvas();
      showToast('ページを削除しました');
    }

    // ===== ADD PAGE MODAL =====
    function openAddModal() {
      document.getElementById('new-page-name').value = '';
      document.getElementById('new-page-icon').value = '';
      document.getElementById('new-page-price').value = '';
      document.getElementById('new-page-memo').value = '';
      document.getElementById('modal-add').classList.add('show');
      setTimeout(() => document.getElementById('new-page-name').focus(), 100);
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    function addPage() {
      const name = document.getElementById('new-page-name').value.trim();
      if (!name) { showToast('ページ名を入力してください'); return; }
      const level = parseInt(document.getElementById('new-page-level').value);
      // only one L0
      if (level === 0 && state.pages.some(p => p.level === 0)) {
        showToast('L0（トップ）は1ページのみです'); return;
      }
      state.pages.push({
        id: nextId++,
        name,
        icon: document.getElementById('new-page-icon').value || (level === 0 ? '🏠' : level === 1 ? '📄' : '📝'),
        level,
        type: document.getElementById('new-page-type').value,
        price: parseInt(document.getElementById('new-page-price').value) || 0,
        memo: document.getElementById('new-page-memo').value,
      });
      closeModal('modal-add');
      renderPageList();
      renderCanvas();

    // ===== RENDER CANVAS =====
    function renderCanvas() {
      const canvas = document.getElementById('canvas');
      const siteName = document.getElementById('site-name').value || 'サイト名未設定';
      const clientName = document.getElementById('client-name').value;
      const agencyName = document.getElementById('agency-name').value;

      const l1 = state.pages.filter(p => p.level === 1);

      document.getElementById('stat-pages').textContent = state.pages.length;
      document.getElementById('stat-l1').textContent = l1.length;
      document.getElementById('stat-l2').textContent = l2.length;
      document.getElementById('page-count-label').textContent = state.pages.length + ' ページ';

      const totalPrice = state.pages.reduce((s, p) => s + (p.price || 0), 0);
      document.getElementById('stat-price').textContent = '¥' + totalPrice.toLocaleString();
      if (showPrice) {
        document.getElementById('stat-price-wrap').style.display = 'flex';
        document.getElementById('total-price-label').textContent = '合計 ¥' + totalPrice.toLocaleString();
      } else {
        document.getElementById('total-price-label').textContent = '';

      if (state.pages.length === 0) {
        canvas.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🗂️</div>
        <div class="empty-text">まだページがありません</div>
        <div class="empty-sub">左のパネルから追加するか、AIで自動生成してみましょう</div>
      </div>`;
        return;
      }

      const tc = state.themeColor;
      const c0 = state.themeColor; // L0色 = ユーザー設定テーマカラー
      const metaParts = [clientName, agencyName, createdDate].filter(Boolean).join('　|　');

      // 縦ツリー構造を構築
      const buildTree = () => {
        const l0 = state.pages.filter(p => p.level === 0);
        const l1 = state.pages.filter(p => p.level === 1);
        const l2 = state.pages.filter(p => p.level === 2);

        const cardHTML = (p) => {
          const sel = state.selectedPageId === p.id ? 'selected' : '';
          const icon = showIcons ? `<span class="card-icon">${p.icon}</span>` : '';
          const price = showPrice && p.price
            ? `<span style="font-size:11px;color:var(--text2);margin-left:4px">¥${p.price.toLocaleString()}</span>` : '';
          return `
            <div class="tree-card level-${p.level} ${sel}" onclick="selectPage(${p.id})">
              ${icon}
              <span class="card-name">${p.name}</span>
              ${price}
              <span class="card-badge">L${p.level}</span>
            </div>`;
        };

        let html = '<div class="tree-wrap">';

        // L0
        (l0.length ? l0 : []).forEach(p0 => {
          html += `<div class="tree-l0-wrap">${cardHTML(p0)}`;

          if (l1.length) {
            html += '<div class="tree-children">';
            l1.forEach(p1 => {
              html += `<div class="tree-child-item tree-l1-wrap">${cardHTML(p1)}`;

              const children = l2; // 全L2をぶら下げる（または親IDで紐付けも可）
              if (children.length) {
                html += '<div class="tree-children">';
                children.forEach(p2 => {
                  html += `<div class="tree-child-item">${cardHTML(p2)}</div>`;
                });
                html += '</div>';
              }
              html += '</div>';
            });
            html += '</div>';
          }
          html += '</div>';
        });

        html += '</div>';
        return html;
      };

      let html = `
        <div class="sitemap-header" style="--header-color:${tc}">
          <div class="sitemap-title">${siteName}</div>
          ${metaParts ? `<div class="sitemap-meta">${metaParts}</div>` : ''}
        </div>
        ${buildTree()}
      `;

      const memo = document.getElementById('memo').value;
      if (memo) {
        html += `<div style="margin-top:24px;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.8">${memo}</div>`;
      }

      canvas.innerHTML = html;
    }

    // ===== GEMINI API =====
    const GEMINI_MODEL = 'gemini-2.0-flash';

    function getApiKey() {
      return localStorage.getItem('gemini_api_key') || '';

    function saveApiKey() {
      const key = document.getElementById('api-key').value.trim();
      if (!key) { showToast('APIキーを入力してください'); return; }

    async function callGemini(prompt) {
      const key = getApiKey();
      if (!key) throw new Error('APIキーが設定されていません。「🔑 Gemini API キー設定」からキーを保存してください。');
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
          })
        }
      );
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `APIエラー: ${res.status}`);
      }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    // ===== URL SCAN =====
    async function scanURL() {
      const url = document.getElementById('scan-url').value.trim();
      if (!url) { showToast('URLを入力してください'); return; }
      if (!url.startsWith('http')) { showToast('https:// から始まるURLを入力してください'); return; }

      const statusEl = document.getElementById('scan-status');
      const btn = document.querySelector('[onclick="scanURL()"]');

      statusEl.innerHTML = '<span style="color:var(--accent)">🔄 サイトを取得中...</span>';
      btn.disabled = true;
      btn.textContent = '取得中...';

      try {
        // CORSプロキシ経由でHTML取得（複数フォールバック）
        const proxies = [
          u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
          u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
          u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
        ];

        let html = '';
        let lastErr = null;
        for (const proxyFn of proxies) {
          try {
            statusEl.innerHTML = `<span style="color:var(--accent)">🔄 取得中... (${proxies.indexOf(proxyFn) + 1}/${proxies.length})</span>`;
            const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(10000) });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            if (text.trim().startsWith('{')) {
              const j = JSON.parse(text);
              html = j.contents || j.data || text;
            } else {
              html = text;
            }
            if (html && html.length > 100) break;
          } catch (e) {
            lastErr = e;
            continue;
          }
        }
        if (!html || html.length < 100) throw new Error('HTMLを取得できませんでした。URLを確認するか再試行してください。');

        // HTMLからナビゲーション・リンク情報を抽出
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // title・nav・a タグからリンクテキストを収集
        const siteTitle = doc.querySelector('title')?.textContent?.trim() || '';
        const navLinks = [...doc.querySelectorAll('nav a, header a, .menu a, #menu a, .nav a, .navigation a')]
          .map(a => a.textContent.trim())
          .filter(t => t.length > 0 && t.length < 30)
          .slice(0, 20);
        const allLinks = [...doc.querySelectorAll('a[href]')]
          .map(a => ({ text: a.textContent.trim(), href: a.getAttribute('href') }))
          .filter(l => l.text.length > 0 && l.text.length < 30 && !l.href.startsWith('#'))
          .slice(0, 40);

        statusEl.innerHTML = '<span style="color:var(--accent)">✦ AIがページ構成を解析中...</span>';

        // Gemini APIで構成を解析・提案
        const urlPaths = allLinks
          .map(l => l.href)
          .filter(h => h && h.startsWith('/') && h.length > 1)
          .slice(0, 30);

        const prompt = `
あなたはWeb制作のプロです。以下の情報からサイトマップの階層構造をJSON形式で出力してください。

サイトタイトル: ${siteTitle}
サイトURL: ${url}

【ナビゲーションメニューのリンク（L1候補）】
${navLinks.join('\n')}

【URLパス一覧（階層判断의 根拠）】
${urlPaths.join('\n')}

【全リンクテキスト】
${allLinks.slice(0, 30).map(l => l.text).join(', ')}

階層判定ルール（必ず守ること）：
1. <nav>タグ内・グローバルナビに明示されたリンク → level 1
2. URLが1階層（例：/about/）→ level 1
3. URLが2階層以上（例：/service/detail/）→ level 2
4. 疾患名・診療項目・サービス詳細など明らかにサブページのもの → level 2
5. ナビに出てこない本文内リンクは基本 level 2 扱い
6. level 0 はトップページのみ（必ず1件）
7. level 1 は最大8件まで
8. level 2 は最大12件まで
9. サイトのトップページ（ホーム、サイト名そのもの、/のみのURL）は必ずlevel 0にする

JSON配列のみ返すこと（コードブロック・説明文不要）：
[{"name":"ページ名","icon":"絵文字1文字","level":0〜2,"type":"通常/LP/フォーム/ブログ"}]
`;

        const result = await callGemini(prompt);
        const clean = result.replace(/```json|```/g, '').trim();
        const pages = JSON.parse(clean);

        if (!Array.isArray(pages) || pages.length === 0) throw new Error('ページ構成の解析に失敗しました');

        // ページとして追加
        state.pages = pages.map(p => ({
          id: nextId++,
          name: p.name || 'ページ',
          icon: p.icon || '📄',
          level: Number(p.level) || 1,
          type: p.type || '通常',
          price: p.level === 0 ? 80000 : p.level === 1 ? 50000 : 30000,
          memo: '',
        }));

        // L0強制補正：サイト名・ホーム・トップに一致するページを必ずL0にする
        const l0Keywords = ['ホーム', 'トップ', 'TOP', 'Home', siteTitle.split('|')[0].trim(), siteTitle.split('　')[0].trim()];
        let l0Fixed = false;
        state.pages = state.pages.map(p => {
          if (!l0Fixed && (
            p.level === 0 ||
            l0Keywords.some(kw => kw && p.name.includes(kw)) ||
            p.name === siteTitle
          )) {
            l0Fixed = true;
            return { ...p, level: 0 };
          }
          return { ...p, level: p.level === 0 && l0Fixed ? 1 : p.level };
        });

        // L0が1件もない場合は先頭をL0にする
        if (!state.pages.some(p => p.level === 0)) {
          state.pages[0] = { ...state.pages[0], level: 0 };
        }

        // サイト名を常にスキャン結果で上書き
        if (siteTitle) {
          document.getElementById('site-name').value = siteTitle;
          document.getElementById('client-name').value = siteTitle;
        }

        statusEl.innerHTML = `<span style="color:var(--accent3)">✓ ${state.pages.length}ページを読み込みました</span>`;
        showToast(`✦ ${state.pages.length}ページのサイト構成を取得しました！`);
        switchTab('pages', document.querySelectorAll('.tab')[0]);
        renderPageList();
        renderCanvas();

      } catch (e) {
        statusEl.innerHTML = `<span style="color:var(--accent2)">⚠ ${e.message}</span>`;
        showToast('エラーが発生しました');
      } finally {
        btn.disabled = false;
        btn.textContent = '🌐 URLをスキャン';
      }
    }

    // --- コピー検知：クリップボードにウォーターマークを混入 ---
    document.addEventListener('copy', function (e) {
      const selection = window.getSelection();
      if (!selection || selection.toString().length < 10) return;

      const original = selection.toString();
      const watermark = [
        '',
        '',
        '---',
        `[Source] ${_author.tool} ${_author.version}`,
        `[Author] ${_author.name} / ${_author.company}`,
        `[Contact] ${_author.email}`,
        `[URL] ${_author.url}`,
        '[Notice] This content was created using a tool developed by Sanc-Official.',
        '         Unauthorized redistribution or resale is prohibited.',
        '---',
      ].join('\n');

      e.clipboardData.setData('text/plain', original + watermark);
      e.preventDefault();
    });

    // --- DevTools 開口検知：コード盗用抑止メッセージ ---
    (function devToolsGuard() {
      let opened = false;
      const threshold = 160;
      const check = () => {
        if (
          window.outerWidth - window.innerWidth > threshold ||
          window.outerHeight - window.innerHeight > threshold
        ) {
          if (!opened) {
            opened = true;
            console.clear();
            console.log(
              '%c© Sanc-Official / Satoshi Sasaki',
              'font-size:18px;font-weight:bold;color:#6c63ff'
            );
            console.log(
              '%cContact: s.sasaki@sanc-official.com',
              'font-size:13px;color:#43e97b'
            );
            console.log(
              '%cThis tool is proprietary software. Copying or redistribution without permission is prohibited.',
              'font-size:12px;color:#ff6584'
            );
            console.log(
              '%cLicensing inquiries welcome.',
              'font-size:12px;color:#888899'
            );
          }
        } else {
          opened = false;
        }
      };
      setInterval(check, 1000);
    })();

    // --- HTMLメタ情報にも著者情報を埋め込む ---
    (function injectMeta() {
      const metas = [
        { name: 'author', content: `${_author.name} / ${_author.company}` },
        { name: 'copyright', content: `© ${_author.built} ${_author.company}` },
        { name: 'contact', content: _author.email },
        { name: 'generator', content: `${_author.tool} ${_author.version} by ${_author.company}` },
      ];
      metas.forEach(({ name, content }) => {
        const m = document.createElement('meta');
        m.name = name; m.content = content;
        document.head.appendChild(m);
      });
    })();
  </script>
