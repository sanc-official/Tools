                        row.appendChild(k);
                        row.appendChild(v);
                        pg.appendChild(row);
                    });

                    sec.appendChild(pg);
                });

                box.appendChild(sec);
                const sep = document.createElement('div');
                sep.className = 'divider';
                box.appendChild(sep);
            });

            document.getElementById('preview-text').textContent = exportAsText();
        }

        function renderProgress() {
            const p = progress();
            const pct = p.requiredTotal ? Math.round((p.requiredDone / p.requiredTotal) * 100) : 0;
            const chipReq = document.getElementById('chip-required');
            if (chipReq) chipReq.textContent = `必須 ${p.requiredDone}/${p.requiredTotal}`;
            document.getElementById('step-label').textContent = `Step ${stepIndex + 1} / ${QUESTIONNAIRE.length}`;
            document.getElementById('pct-label').textContent = `進捗 ${pct}%`;
            document.getElementById('bar').style.width = pct + '%';
            renderStepPills();
        }

        function rerenderPreviewOnly() { renderPreview(); }
        function rerenderProgressOnly() { renderProgress(); }

        function rerender() {
            ensureDefaults();
            const chip = document.getElementById('chip-save');
            chip.innerHTML = '<span class="dot"></span><span>自動保存</span>';
            renderProgress();
            renderForm();
            renderPreview();
        }

        function softScrollTop() {
            try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
        }

        function setPane(pane) {
            const app = document.getElementById('app');
            app.dataset.pane = pane;

            const tabForm = document.getElementById('tab-form');
            const tabPrev = document.getElementById('tab-preview');
            if (pane === 'form') {
                tabForm.style.cssText = 'flex:1; padding:10px 0; border-radius:999px; font-size:13px; font-weight:800; z-index:1; background:var(--navy)!important; color:#fff!important; box-shadow:0 2px 8px rgba(11,27,58,.18)!important;';
                tabPrev.style.cssText = 'flex:1; padding:10px 0; border-radius:999px; font-size:13px; font-weight:800; z-index:1; background:transparent!important; color:var(--muted)!important; box-shadow:none!important;';
            } else {
                tabForm.style.cssText = 'flex:1; padding:10px 0; border-radius:999px; font-size:13px; font-weight:800; z-index:1; background:transparent!important; color:var(--muted)!important; box-shadow:none!important;';
                tabPrev.style.cssText = 'flex:1; padding:10px 0; border-radius:999px; font-size:13px; font-weight:800; z-index:1; background:var(--orange)!important; color:#fff!important; box-shadow:0 2px 8px rgba(255,106,42,.3)!important;';
            }
        }

        // Events
        document.getElementById('btn-reset').addEventListener('click', () => {
            if (!confirm('入力内容をリセットします。よろしいですか？')) return;
            state = { ...defaultState };
            stepIndex = 0;
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
            rerender();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (!confirm('入力内容を全消しします。よろしいですか？')) return;
            state = { ...defaultState };
            stepIndex = 0;
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
            rerender();
        });

        document.getElementById('btn-copy').addEventListener('click', async () => {
            const text = exportAsText();
            const btn = document.getElementById('btn-copy');
            const originalText = btn.textContent;

            const showSuccess = () => {
                btn.innerHTML = '✓ コピーしました！';
                btn.style.setProperty('background', 'var(--navy)', 'important');
                btn.style.setProperty('color', '#fff', 'important');
                btn.style.setProperty('border-color', 'transparent', 'important');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.removeProperty('background');
                    btn.style.removeProperty('color');
                    btn.style.removeProperty('border-color');
                }, 1800);
            };

            try { await navigator.clipboard.writeText(text); showSuccess(); }
            catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showSuccess(); }
                catch (err) { alert('コピーに失敗しました（ブラウザの権限をご確認ください）'); }
                ta.remove();
            }
        });

        document.getElementById('btn-pdf').addEventListener('click', () => pdfByPrint());

        document.getElementById('btn-consult').addEventListener('click', () => {
            pdfByPrint();
        });

        document.getElementById('tab-form').addEventListener('click', () => setPane('form'));
        document.getElementById('tab-preview').addEventListener('click', () => setPane('preview'));

        // iOS zoom prevention on input focus
        (function preventiOSZoom() {
            // Intercept touchstart on inputs and reset scale before focus fires
            document.addEventListener('touchstart', function (e) {
                const el = e.target;
                if (!el) return;
                const tag = el.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
                    const meta = document.querySelector('meta[name="viewport"]');
                    if (meta) {
                        meta.setAttribute('content', 'width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no');
                    }
                }
            }, { passive: true });
        })();

        // keyboard layout stability on mobile
        (function mobileKeyboardFix() {
            const vv = window.visualViewport;
            if (!vv) return;
            const setVh = () => document.documentElement.style.setProperty('--vvh', `${vv.height}px`);
            setVh();
            vv.addEventListener('resize', setVh);
            vv.addEventListener('scroll', setVh);
            window.addEventListener('focusin', (e) => {
                const el = e.target;
                if (!el) return;
                const tag = el.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || el.getAttribute?.('role') === 'combobox') {
                    setTimeout(() => {
                        try { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (err) { }
                    }, 60);
                }
            });
        })();

        // Init
        setPane('form');
        rerender();

        // Dev sanity checks
        (function runSelfTestsOnce() {
            if (window.__PA4FIC_HEARING_TESTS_RAN__) return;
            window.__PA4FIC_HEARING_TESTS_RAN__ = true;

            console.assert(Array.isArray(QUESTIONNAIRE) && QUESTIONNAIRE.length >= 3, 'QUESTIONNAIRE should exist');
            const all = QUESTIONNAIRE.flatMap(s => s.groups.flatMap(g => g.fields));
            const keys = new Set(all.map(f => f.key));
            ['businessMain', 'commonInquiries', 'targetAge', 'deadline', 'brandColor', 'subColor', 'designMood', 'webGoalActions'].forEach(k => console.assert(keys.has(k), `${k} should exist`));
        })();
    </script>

</body>
